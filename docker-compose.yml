services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-indicadores_folha}
      POSTGRES_USER: ${POSTGRES_USER:-indicadores}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-troque-esta-senha}
    ports:
      - "5432:5432"
    volumes:
      - indicadores_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-indicadores} -d ${POSTGRES_DB:-indicadores_folha}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  indicadores_postgres:

